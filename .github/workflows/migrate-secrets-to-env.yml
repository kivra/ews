# Migration workflow - copies org/repo secrets to the prod environment
# Generated by generate_migration_workflow.py
#
# Usage:
#   1. Merge this PR
#   2. Go to Actions -> "Migrate Secrets to Environment" -> Run workflow
#   3. After successful run, you can delete this workflow file
#
# Secrets to migrate: PRIVATE_SSH_KEY

name: Migrate Secrets to Environment

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Target environment for secrets'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod

jobs:
  migrate-secrets:
    name: Migrate secrets to ${{ inputs.target_environment }} environment
    runs-on: ubuntu-latest

    steps:
      - name: Verify environment exists
        run: |
          if ! gh api "repos/${{ github.repository }}/environments/${{ inputs.target_environment }}" >/dev/null 2>&1; then
            echo "::error::Environment '${{ inputs.target_environment }}' does not exist."
            echo ""
            echo "Please create the environment first:"
            echo "  gh api --method PUT repos/${{ github.repository }}/environments/${{ inputs.target_environment }}"
            echo ""
            echo "Or via the GitHub UI: Settings -> Environments -> New environment"
            exit 1
          fi
          echo "✓ Environment '${{ inputs.target_environment }}' exists"
        env:
          GH_TOKEN: ${{ secrets.KIVRABOT }}

      - name: Migrate PRIVATE_SSH_KEY
        run: echo "$SECRET_VALUE" | gh secret set PRIVATE_SSH_KEY --repo ${{ github.repository }} --env prod
        env:
          GH_TOKEN: ${{ secrets.KIVRABOT }}
          SECRET_VALUE: ${{ secrets.PRIVATE_SSH_KEY }}

      - name: Summary
        run: |
          echo "## Secrets Migrated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following secrets have been copied to the **${{ inputs.target_environment }}** environment:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- `PRIVATE_SSH_KEY`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Update workflows to use environment: ${{ inputs.target_environment }} instead of secrets: inherit" >> $GITHUB_STEP_SUMMARY
          echo "2. Test that workflows still work correctly" >> $GITHUB_STEP_SUMMARY
          echo "3. Delete this migration workflow file" >> $GITHUB_STEP_SUMMARY
